name: Extract Zip and Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: List files
      run: |
        echo "Current files:"
        ls -la
        echo ""
        echo "Zip files found:"
        find . -name "*.zip" -type f
      
    - name: Extract zip file
      run: |
        # Find and extract zip
        ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
        if [ -n "$ZIP_FILE" ]; then
          echo "Extracting: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d extracted/
          rm "$ZIP_FILE"
          
          # Move extracted files to root
          if [ -d "extracted" ]; then
            cp -r extracted/* ./
            rm -rf extracted
          fi
        fi
        
        echo "Files after extraction:"
        ls -la
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
      
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make gradlew executable
      run: |
        chmod +x gradlew 2>/dev/null || true
        if [ -f "app/gradlew" ]; then
          chmod +x app/gradlew
        fi
      
    - name: Build APK
      run: |
        if [ -f "gradlew" ]; then
          ./gradlew assembleDebug --stacktrace
        elif [ -f "app/gradlew" ]; then
          cd app
          ./gradlew assembleDebug
        else
          echo "No gradlew found, checking structure:"
          find . -name "build.gradle*" -type f
        fi
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TelegramCloudStorage-Debug
        path: |
          app/build/outputs/apk/debug/*.apk
          app/app/build/outputs/apk/debug/*.apk
          build/outputs/apk/debug/*.apk
